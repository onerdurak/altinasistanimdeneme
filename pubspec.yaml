name: altin_asistanim
description: Altin ve Borc Takip Uygulamasi
publish_to: 'none'
version: 1.0.13+40

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # İkonlar ve UI içini
  provider: ^6.1.2
  hive_flutter: ^1.1.0
  cupertino_icons: ^1.0.6
  # Veri çekmek için
  http: ^1.2.0
  # Sayı ve Tarih formatlamak için
  intl: ^0.19.0
  # Verileri hafızada tutmak için
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  local_auth: ^3.0.1
  in_app_purchase: ^3.2.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # İkon üretici
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  # Resim klasörünü tanıttık
  assets:
    - assets/icon/

# İkon Ayarları (Sarı Zemin - Siyah İkon)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFD700"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
